<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Plaid OAuth Redirect</title>
</head>
<body>
  Redirecting back to your local app...

  <script>
    const query = window.location.search || "";
    const hash = window.location.hash || "";
    window.location.replace("http://localhost:5000/" + query + hash);
  </script>
</body>
</html>
